name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          AA1BDA: ${{ secrets.AA1BDA }}
          B4FF3B: ${{ secrets.B4FF3B }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AA1BDA', '')
          meta_b = os.environ.get('B4FF3B', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- d92cb1f32002d842dc1eb5c71a0499a9803bb73b236617f3 -->', meta_a)
              if meta_b:
                  out = out.replace('<!-- 6b1c04e05a08c1335eb59afd3931448dddb0139d -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
